# .github/workflows/build.yml
name: Build and Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build Java module
        run: mvn clean install -pl quantlib4j-java -DskipTests

      - name: Upload Java JAR
        uses: actions/upload-artifact@v4
        with:
          name: quantlib4j-java
          path: quantlib4j-java/target/*.jar

  build-docker:
    runs-on: ubuntu-latest
    needs: build-java
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -f Dockerfile.build -t quantlib4j-builder .

      - name: Generate Java code
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace \
            quantlib4j-builder /bin/bash -c \
            "cd /workspace && ./scripts/build-swig.sh"

      - name: Package Java JAR
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace \
            quantlib4j-builder /bin/bash -c \
            "cd /workspace && ./scripts/build-java.sh"

      - name: Upload generated artifacts
        uses: actions/upload-artifact@v4
        with:
          name: generated-java
          path: |
            quantlib4j-java/src/main/java/**/*.java
            quantlib4j-java/target/*.jar